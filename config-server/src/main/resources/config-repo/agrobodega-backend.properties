# CATÁLOGO DE PARÁMETROS AGROBODEGA

# Porcentaje de comisión al registrar entrada
agrobodega.parameters.entry-commission-rate=0.05

# Porcentaje de comisión al registrar salida
agrobodega.parameters.exit-commission-rate=0.03

# Umbral para alerta de bajo stock
agrobodega.parameters.low-stock-threshold=10

# Moneda usada por el sistema
agrobodega.parameters.currency=COP

# Tamańo de página por defecto
agrobodega.parameters.default-page-size=20

# Correo destino de notificaciones
agrobodega.parameters.notification-to-email=kellyfernandauribe@gmail.com

# Evento de notificación para entrada registrada
agrobodega.parameters.entry-notification-event=ENTRY_REGISTERED

# Estado del catálogo de parámetros
agrobodega.parameters.catalog-enabled=true