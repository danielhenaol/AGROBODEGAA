spring.application.name=agrobodega-backend

# ===============================
# AZURE KEY VAULT
# ===============================
spring.cloud.azure.keyvault.secret.property-source-enabled=true
spring.cloud.azure.keyvault.secret.property-sources[0].name=agrobodega-keyvault
spring.cloud.azure.keyvault.secret.property-sources[0].endpoint=https://agrobodega-kv-kelly.vault.azure.net/

# ===============================
# POSTGRESQL / SUPABASE
# Primero intenta leer desde Azure Key Vault con guion medio.
# Si no lo encuentra, usa Railway Variables con guion bajo.
# ===============================
spring.datasource.url=${SPRING-DATASOURCE-URL:${SPRING_DATASOURCE_URL}}
spring.datasource.username=${SPRING-DATASOURCE-USERNAME:${SPRING_DATASOURCE_USERNAME}}
spring.datasource.password=${SPRING-DATASOURCE-PASSWORD:${SPRING_DATASOURCE_PASSWORD}}

# ===============================
# JPA
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===============================
# REDIS
# Tiene valores por defecto para que Railway no se caiga si no hay Redis
# ===============================
spring.data.redis.host=${SPRING-DATA-REDIS-HOST:${SPRING_DATA_REDIS_HOST:localhost}}
spring.data.redis.port=${SPRING-DATA-REDIS-PORT:${SPRING_DATA_REDIS_PORT:6379}}
spring.data.redis.password=${SPRING-DATA-REDIS-PASSWORD:${SPRING_DATA_REDIS_PASSWORD:}}

# ===============================
# AUTH0
# ===============================
spring.security.oauth2.resourceserver.jwt.issuer-uri=${SPRING-SECURITY-OAUTH2-RESOURCESERVER-JWT-ISSUER-URI:${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI}}
spring.security.oauth2.resourceserver.jwt.audiences=${SPRING-SECURITY-OAUTH2-RESOURCESERVER-JWT-AUDIENCES:${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_AUDIENCES}}

# ===============================
# SWAGGER / OPENAPI
# ===============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ===============================
# SERVER
# ===============================
server.port=${SERVER-PORT:${SERVER_PORT:8080}}

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ===============================
# LOGGING / MDC
# ===============================
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [traceId=%X{traceId}] [%X{method}] %-5level %logger{36} - %msg%n

spring.jackson.serialization.write-dates-as-timestamps=false

# ===============================
# SENDGRID
# ===============================
sendgrid.api.key=${SENDGRID-API-KEY:${SENDGRID_API_KEY}}
sendgrid.from.email=${SENDGRID-FROM-EMAIL:${SENDGRID_FROM_EMAIL}}

# ===============================
# STRAPI CATALOGS
# ===============================
strapi.base-url=${STRAPI-BASE-URL:${STRAPI_BASE_URL}}