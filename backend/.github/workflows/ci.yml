name: AGROBODEGA CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'oracle'

      - name: Build with Maven
        run: mvn clean compile -f agrobodega-backend/pom.xml

      - name: Run tests
        run: mvn test -f agrobodega-backend/pom.xml
