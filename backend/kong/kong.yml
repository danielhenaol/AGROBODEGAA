_format_version: "3.0"
_transform: true

services:
  - name: agrobodega-backend
    url: https://agrobodegaa-production.up.railway.app
    routes:
      - name: backend-route
        paths:
          - /api
        strip_path: false

plugins:
  - name: cors
    config:
      origins:
        - "http://localhost:5173"
        - "https://agrobodegaa.pages.dev"
        - "https://invigorating-charm-production-5459.up.railway.app"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
      exposed_headers:
        - Authorization
      credentials: true
  - name: rate-limiting
    config:
      minute: 100
      policy: local